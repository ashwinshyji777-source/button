<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            width: 100px;
            height: 50px;
            border-radius: 20px;
            background-color: rgb(79, 195, 224);

        }
    </style>
</head>
<body>
    <button>click me</button>
    <script>
        let a=document.getElementsByTagName("button")
        let move=0
        let dir=1
        a[0].addEventListener("mouseover",function(){
            move=move+(100*dir);
            a[0].style.marginLeft=move+"px"
            dir= dir * -1

        })
       
        
    </script>
</body>

</html>
